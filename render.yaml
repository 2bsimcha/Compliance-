# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect this repo. See DEPLOY.md.
databases:
  # Managed Postgres — data survives redeploys and the app can scale to >1 instance.
  # `free` is fine to start; check Render's current free-tier limits and move to a paid
  # plan for production durability.
  - name: cpsc-db
    plan: free
    databaseName: compliance
    user: compliance

services:
  - type: web
    name: cpsc-compliance
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.15"
      # Postgres connection string, injected from the managed database above. The app
      # normalizes the scheme to the psycopg driver automatically (app/database.py).
      - key: DATABASE_URL
        fromDatabase:
          name: cpsc-db
          property: connectionString
      # REQUIRED — the shared login password. Set this in the Render dashboard; without
      # it the instance is publicly accessible.
      - key: APP_PASSWORD
        sync: false
      - key: APP_USERNAME
        value: admin
      # Signs the session cookie. Render generates a stable value so logins survive
      # restarts.
      - key: SESSION_SECRET
        generateValue: true
      # Mark the session cookie Secure — Render terminates HTTPS at the edge.
      - key: SESSION_HTTPS_ONLY
        value: "true"
      # Optional — enables Claude-backed extraction. Without it, intake uses heuristics.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COMPLIANCE_LLM_MODEL
        value: claude-opus-4-8
